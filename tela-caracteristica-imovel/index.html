<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Características</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../ativos/js/config.js"></script>
    <script src="../ativos/js/supabase-config.js"></script>
    <script src="../ativos/js/supabase-db.js"></script>
    <script src="../ativos/js/supabase-adapter.js"></script>

    <link rel="icon" type="image/jpeg" href="../tela-inicial/img/logo.jpg" />
    <link rel="stylesheet" href="../ativos/css/style-admin-premium.css" />
    <style>
      /* Reset body para fullscreen */
      html, body {
          margin: 0;
          padding: 0;
          width: 100%;
          height: 100%;
          overflow-x: hidden;
      }

      /* Estatísticas */
      .stats-container {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
          gap: 16px;
          margin-bottom: 24px;
      }
      .stat-card {
          background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
          padding: 20px;
          border-radius: 12px;
          border: 1px solid rgba(255,255,255,0.1);
          text-align: center;
          transition: all 0.3s ease;
      }
      .stat-card:hover {
          transform: translateY(-4px);
          box-shadow: 0 8px 24px rgba(201, 169, 97, 0.2);
          border-color: rgba(201, 169, 97, 0.3);
      }
      .stat-value {
          font-size: 2.5rem;
          font-weight: 700;
          color: var(--color-gold);
          margin-bottom: 8px;
          text-shadow: 0 2px 8px rgba(201, 169, 97, 0.3);
      }
      .stat-label {
          font-size: 0.95rem;
          color: var(--color-muted);
          text-transform: uppercase;
          letter-spacing: 1px;
          font-weight: 600;
      }

      /* Campo de busca */
      .search-section {
          margin-bottom: 24px;
      }
      .search-box {
          position: relative;
      }
      .search-box input {
          width: 100%;
          padding: 14px 48px 14px 16px;
          border-radius: 10px;
          border: 2px solid rgba(255,255,255,0.1);
          background: rgba(255,255,255,0.05);
          color: var(--color-text);
          font-size: 1rem;
          transition: all 0.3s ease;
      }
      .search-box input:focus {
          outline: none;
          border-color: var(--color-gold);
          background: rgba(255,255,255,0.08);
          box-shadow: 0 0 20px rgba(201, 169, 97, 0.2);
      }
      .search-box::after {
          content: '🔍';
          position: absolute;
          right: 16px;
          top: 50%;
          transform: translateY(-50%);
          font-size: 1.3rem;
          pointer-events: none;
      }

      /* Formulário de adicionar - Design vertical moderno */
      #caracteristica-form {
          background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
          padding: 32px;
          border-radius: 16px;
          border: 1px solid rgba(255,255,255,0.1);
          box-shadow: 0 8px 32px rgba(0,0,0,0.3);
          margin-bottom: 32px;
          position: relative;
          overflow: hidden;
      }

      #caracteristica-form::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 4px;
          background: linear-gradient(90deg, var(--color-gold), #b8935a, var(--color-gold));
          background-size: 200% 100%;
          animation: shimmer 3s linear infinite;
      }

      @keyframes shimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
      }

      .form-header {
          display: flex;
          align-items: center;
          gap: 12px;
          margin-bottom: 24px;
          padding-bottom: 16px;
          border-bottom: 1px solid rgba(255,255,255,0.1);
      }

      .form-header-icon {
          width: 48px;
          height: 48px;
          background: linear-gradient(135deg, rgba(201, 169, 97, 0.3), rgba(201, 169, 97, 0.1));
          border-radius: 12px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 1.5rem;
      }

      .form-header-text h3 {
          margin: 0;
          color: var(--color-white);
          font-size: 1.2rem;
          font-weight: 700;
      }

      .form-header-text p {
          margin: 4px 0 0 0;
          color: var(--color-muted);
          font-size: 0.9rem;
      }

      .form-content {
          display: flex;
          flex-direction: column;
          gap: 20px;
      }

      #caracteristica-form label {
          display: flex;
          flex-direction: column;
          gap: 12px;
          color: var(--color-white);
          font-weight: 600;
          font-size: 1rem;
      }

      #caracteristica-form label span {
          display: flex;
          align-items: center;
          gap: 8px;
          text-transform: uppercase;
          letter-spacing: 0.8px;
          font-size: 0.85rem;
          color: var(--color-gold);
          font-weight: 700;
      }

      .input-wrapper {
          position: relative;
          display: flex;
          align-items: center;
          gap: 12px;
      }

      .input-wrapper::before {
          content: '✏️';
          font-size: 1.5rem;
          opacity: 0.7;
          transition: all 0.3s ease;
          flex-shrink: 0;
      }

      #caracteristica-form input:focus ~ .input-wrapper::before {
          transform: scale(1.1);
          opacity: 1;
      }

      #caracteristica-form input {
          padding: 16px 20px;
          border-radius: 12px;
          border: 2px solid rgba(255,255,255,0.1);
          background: rgba(255,255,255,0.05);
          color: var(--color-text);
          font-size: 1.05rem;
          transition: all 0.3s ease;
          width: 100%;
      }

      #caracteristica-form input:focus {
          outline: none;
          border-color: var(--color-gold);
          background: rgba(255,255,255,0.08);
          box-shadow: 0 0 0 4px rgba(201, 169, 97, 0.1), 0 8px 24px rgba(201, 169, 97, 0.2);
          transform: translateY(-2px);
      }

      #caracteristica-form input::placeholder {
          color: rgba(255,255,255,0.4);
          font-style: italic;
      }

      .form-actions {
          display: flex;
          gap: 12px;
          margin-top: 8px;
      }

      #caracteristica-form button {
          flex: 1;
          background: linear-gradient(135deg, var(--color-gold) 0%, #b8935a 100%);
          color: #1a1a1a;
          border: none;
          padding: 16px 32px;
          border-radius: 12px;
          cursor: pointer;
          font-weight: 700;
          font-size: 1rem;
          text-transform: uppercase;
          letter-spacing: 1.5px;
          transition: all 0.3s ease;
          box-shadow: 0 4px 15px rgba(201, 169, 97, 0.3);
          position: relative;
          overflow: hidden;
      }

      #caracteristica-form button::before {
          content: '';
          position: absolute;
          top: 50%;
          left: 50%;
          width: 0;
          height: 0;
          border-radius: 50%;
          background: rgba(255,255,255,0.3);
          transform: translate(-50%, -50%);
          transition: width 0.6s, height 0.6s;
      }

      #caracteristica-form button:hover::before {
          width: 300px;
          height: 300px;
      }

      #caracteristica-form button:hover {
          transform: translateY(-3px);
          box-shadow: 0 8px 30px rgba(201, 169, 97, 0.5);
      }

      #caracteristica-form button:active {
          transform: translateY(-1px);
      }

      #caracteristica-form button span {
          position: relative;
          z-index: 1;
      }

      /* Responsividade */
      @media (max-width: 768px) {
          #caracteristica-form {
              padding: 24px;
          }

          .form-header {
              flex-direction: column;
              text-align: center;
          }

          #caracteristica-form input {
              padding: 14px 18px;
              font-size: 1rem;
          }
      }
          #caracteristica-form button {
              padding: 14px 24px;
              font-size: 0.95rem;
          }
      }

      /* Lista de características */
      .list-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 16px;
      }

      .list-header h2 {
          color: var(--color-white);
          font-size: 1.4rem;
          display: flex;
          align-items: center;
          gap: 12px;
          margin: 0;
      }

      .btn-reload {
          padding: 10px 20px;
          background: rgba(201, 169, 97, 0.2);
          border: 1px solid var(--color-gold);
          border-radius: 8px;
          color: var(--color-gold);
          cursor: pointer;
          font-size: 0.95rem;
          transition: all 0.3s;
          font-weight: 600;
      }
      .btn-reload:hover {
          background: rgba(201, 169, 97, 0.3);
          transform: translateY(-2px);
          box-shadow: 0 4px 12px rgba(201, 169, 97, 0.3);
      }

      ul#lista-caracteristicas {
          list-style: none;
          padding: 0;
          margin-top: 1rem;
          display: grid;
          gap: 12px;
      }

      ul#lista-caracteristicas li {
          background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
          padding: 18px 20px;
          border-radius: 10px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          gap: 16px;
          border: 1px solid rgba(255,255,255,0.08);
          transition: all 0.3s ease;
      }

      ul#lista-caracteristicas li:hover {
          background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.04) 100%);
          border-color: rgba(201, 169, 97, 0.3);
          transform: translateX(4px);
      }

      ul#lista-caracteristicas li span {
          color: var(--color-text);
          font-size: 1.05rem;
          font-weight: 500;
          display: flex;
          align-items: center;
          gap: 10px;
      }

      ul#lista-caracteristicas li span::before {
          content: '✓';
          display: inline-flex;
          align-items: center;
          justify-content: center;
          width: 24px;
          height: 24px;
          background: rgba(201, 169, 97, 0.2);
          border-radius: 50%;
          color: var(--color-gold);
          font-size: 0.85rem;
          font-weight: 700;
      }

      ul#lista-caracteristicas li button {
          background: rgba(231, 76, 60, 0.2);
          color: #e74c3c;
          border: 1px solid rgba(231, 76, 60, 0.3);
          padding: 8px 16px;
          border-radius: 8px;
          cursor: pointer;
          font-weight: 600;
          font-size: 0.9rem;
          transition: all 0.3s ease;
      }

      ul#lista-caracteristicas li button:hover {
          background: rgba(231, 76, 60, 0.3);
          border-color: #e74c3c;
          transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 24px;
        "
      >
        <h1 style="margin-bottom: 0 !important">
          🏠 Cadastro de Características
        </h1>
        <a
          href="../tela-de-login/painel.html"
          style="
            background: linear-gradient(
              135deg,
              rgba(201, 169, 97, 0.2) 0%,
              rgba(201, 169, 97, 0.1) 100%
            );
            color: var(--color-gold);
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 1px;
            border: 2px solid rgba(201, 169, 97, 0.3);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
          "
          onmouseover="
            this.style.background =
              'linear-gradient(135deg, rgba(201, 169, 97, 0.3) 0%, rgba(201, 169, 97, 0.2) 100%)';
            this.style.transform = 'translateY(-2px)';
            this.style.boxShadow = '0 6px 20px rgba(201, 169, 97, 0.3)';
          "
          onmouseout="
            this.style.background =
              'linear-gradient(135deg, rgba(201, 169, 97, 0.2) 0%, rgba(201, 169, 97, 0.1) 100%)';
            this.style.transform = 'translateY(0)';
            this.style.boxShadow = 'none';
          "
          >← Voltar ao Painel</a
        >
      </div>

      <!-- Estatísticas -->
      <div class="stats-container">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Total de Características</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-recentes">0</div>
          <div class="stat-label">Adicionadas Hoje</div>
        </div>
      </div>

      <!-- Campo de Busca -->
      <div class="search-section">
        <div class="search-box">
          <input
            type="text"
            id="busca-caracteristica"
            placeholder="Buscar característica..."
          />
        </div>
      </div>

      <!-- Formulário -->
      <form id="caracteristica-form">
        <div class="form-header">
          <div class="form-header-icon">➕</div>
          <div class="form-header-text">
            <h3>Nova Característica</h3>
            <p>Adicione características que os imóveis podem ter</p>
          </div>
        </div>

        <div class="form-content">
          <label>
            <span>📝 Nome da Característica</span>
            <div class="input-wrapper">
              <input
                type="text"
                name="caracteristica"
                placeholder="Ex: Piscina, Churrasqueira, Jardim, Ar Condicionado..."
                required
                autocomplete="off"
              />
            </div>
          </label>

          <div class="form-actions">
            <button type="submit">
              <span>Adicionar Característica</span>
            </button>
          </div>
        </div>
      </form>

      <!-- Lista -->
      <div class="list-header">
        <h2>📋 Características Cadastradas</h2>
        <button
          type="button"
          onclick="recarregarCaracteristicas()"
          class="btn-reload"
        >
          🔄 Recarregar
        </button>
      </div>

      <ul id="lista-caracteristicas">
        <li
          style="
            text-align: center;
            padding: 20px;
            color: var(--color-muted);
            border: none;
          "
        >
          ⏳ Carregando características...
        </li>
      </ul>

      <footer class="footer-dev">
        Desenvolvido por
        <a
          href="https://www.instagram.com/abr3u.dev/"
          target="_blank"
          style="
            color: #c9a961;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
          "
          onmouseover="this.style.color = '#fff'"
          onmouseout="this.style.color = '#c9a961'"
          >Ruan Abreu</a
        >
      </footer>
    </div>
    <script src="/tela-caracteristica-imovel/script.js"></script>
  </body>
</html>
