<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar Atendimento</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../Ativos/js/config.js"></script>
    <script src="../Ativos/js/supabase-config.js"></script>
    <script src="../Ativos/js/supabase-db.js"></script>
    <script src="../Ativos/js/supabase-adapter.js"></script>

    <link rel="stylesheet" href="../Ativos/CSS/style-admin-premium.css" />
    <style>
      /* Reset body para fullscreen */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
      }
      /* Estilos complementares */
      .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        margin-left: 8px;
        color: #081018;
      }
      .badge-novo {
        background: #7fb3ff;
        color: #042033;
      }
      .badge-interessado {
        background: #ffb86b;
        color: #2a1400;
      }
      .badge-visita {
        background: #9beaa6;
        color: #05320a;
      }
      .container h1 {
        color: var(--color-white);
        margin-bottom: 0.6rem;
      }
      form label {
        display: block;
        margin-bottom: 0.6rem;
        color: var(--color-muted);
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 0.6rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.02);
        color: var(--color-text);
      }
      button {
        background: var(--color-gold);
        color: #111;
        border: none;
        padding: 0.6rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: var(--shadow-soft);
      }
      button:hover {
        opacity: 0.95;
        transform: translateY(-1px);
      }
      ul#lista-atendimentos {
        list-style: none;
        padding: 0;
        margin-top: 1rem;
      }
      ul#lista-atendimentos li {
        background: rgba(255, 255, 255, 0.03);
        padding: 0.8rem;
        margin-bottom: 0.6rem;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .atendimento-info {
        flex: 1;
      }
      .atendimento-info .meta {
        color: var(--color-muted);
        font-size: 0.9rem;
        margin-top: 4px;
      }
      .atendimento-info .desc {
        margin-top: 6px;
        color: var(--color-white);
        opacity: 0.9;
      }
      .atendimento-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      /* Busca e filtros */
      .search-filters {
        background: rgba(255, 255, 255, 0.03);
        padding: 16px;
        border-radius: 10px;
        margin-bottom: 16px;
        display: grid;
        grid-template-columns: 2fr 1fr auto;
        gap: 12px;
        align-items: center;
      }
      .search-box {
        position: relative;
      }
      .search-box input {
        width: 100%;
        padding: 10px 40px 10px 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: var(--color-text);
      }
      .search-box::after {
        content: "🔍";
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.2rem;
      }

      /* Notas/Acompanhamento */
      .notas-section {
        background: rgba(255, 255, 255, 0.03);
        padding: 12px;
        border-radius: 8px;
        margin-top: 8px;
        border-left: 3px solid var(--color-gold);
      }
      .nota-item {
        padding: 8px;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 6px;
        margin-bottom: 6px;
        font-size: 0.9rem;
      }
      .nota-data {
        color: var(--color-muted);
        font-size: 0.8rem;
      }

      /* Contador de estatísticas */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 16px;
      }
      .stat-card {
        background: rgba(255, 255, 255, 0.03);
        padding: 12px;
        border-radius: 10px;
        text-align: center;
      }
      .stat-number {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--color-gold);
      }
      .stat-label {
        font-size: 0.9rem;
        color: var(--color-muted);
        margin-top: 4px;
      }

      /* Estilos do formulário */
      #atendimento-form {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(255, 255, 255, 0.02) 100%
        );
        padding: 28px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-bottom: 24px;
      }
      #atendimento-form label {
        display: flex;
        flex-direction: column;
        gap: 8px;
        color: var(--color-white);
        font-weight: 600;
        font-size: 0.95rem;
        margin-bottom: 0;
      }
      #atendimento-form label span.label-text {
        display: flex;
        align-items: center;
        gap: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-size: 0.85rem;
      }
      #atendimento-form input,
      #atendimento-form select,
      #atendimento-form textarea {
        padding: 12px 16px;
        border-radius: 8px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: var(--color-text);
        font-size: 1rem;
        transition: all 0.3s ease;
        width: 100%;
      }
      #atendimento-form input:focus,
      #atendimento-form select:focus,
      #atendimento-form textarea:focus {
        outline: none;
        border-color: var(--color-gold);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.1);
      }
      #atendimento-form textarea {
        resize: vertical;
        min-height: 100px;
        font-family: inherit;
      }
      #atendimento-form button[type="submit"] {
        grid-column: span 2;
        background: linear-gradient(135deg, var(--color-gold) 0%, #b8935f 100%);
        color: #111;
        border: none;
        padding: 16px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 15px rgba(201, 169, 97, 0.3);
        transition: all 0.3s ease;
      }
      #atendimento-form button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(201, 169, 97, 0.5);
      }
      .form-row-full {
        grid-column: span 2;
      }
      .form-section-header {
        grid-column: span 2;
        color: var(--color-gold);
        font-size: 1.1rem;
        font-weight: 700;
        margin-top: 8px;
        padding-bottom: 8px;
        border-bottom: 2px solid rgba(201, 169, 97, 0.3);
        display: flex;
        align-items: center;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 1rem;
        "
      >
        <h1 style="margin-bottom: 0 !important">Cadastrar Atendimento</h1>
        <a
          href="../tela-de-login/painel.html"
          style="
            background: linear-gradient(
              135deg,
              rgba(201, 169, 97, 0.2) 0%,
              rgba(201, 169, 97, 0.1) 100%
            );
            color: var(--color-gold);
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 1px;
            border: 2px solid rgba(201, 169, 97, 0.3);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
          "
          onmouseover="
            this.style.background =
              'linear-gradient(135deg, rgba(201, 169, 97, 0.3) 0%, rgba(201, 169, 97, 0.2) 100%)';
            this.style.transform = 'translateY(-2px)';
            this.style.boxShadow = '0 6px 20px rgba(201, 169, 97, 0.3)';
          "
          onmouseout="
            this.style.background =
              'linear-gradient(135deg, rgba(201, 169, 97, 0.2) 0%, rgba(201, 169, 97, 0.1) 100%)';
            this.style.transform = 'translateY(0)';
            this.style.boxShadow = 'none';
          "
          >← Voltar ao Painel</a
        >
      </div>

      <!-- Estatísticas -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-number" id="stat-total">0</div>
          <div class="stat-label">Total de Atendimentos</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-mes">0</div>
          <div class="stat-label">Este Mês</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-visitas">0</div>
          <div class="stat-label">Visitas Agendadas</div>
        </div>
      </div>

      <!-- Busca e Filtros -->
      <div class="search-filters">
        <div class="search-box">
          <input
            type="text"
            id="busca-atendimento"
            placeholder="Buscar por cliente, documento ou descrição..."
          />
        </div>
        <select
          id="filtro-status-atend"
          style="
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--color-text);
          "
        >
          <option value="">Todos os Status</option>
          <option value="novo">Cliente Novo</option>
          <option value="interessado">Interessado</option>
          <option value="visita">Visita Agendada</option>
        </select>
        <button
          type="button"
          onclick="limparFiltrosAtendimento()"
          style="
            background: linear-gradient(
              135deg,
              rgba(255, 255, 255, 0.1) 0%,
              rgba(255, 255, 255, 0.05) 100%
            );
            color: var(--color-text);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
          "
        >
          Limpar
        </button>
      </div>

      <!-- Formulário de Cadastro -->
      <form id="atendimento-form">
        <div class="form-section-header">👤 Informações do Cliente</div>

        <label class="form-row-full">
          <span class="label-text">📝 Nome do Cliente:</span>
          <input
            type="text"
            name="cliente"
            required
            placeholder="Digite o nome completo do cliente"
          />
        </label>

        <label>
          <span class="label-text">🎫 CPF / CNPJ:</span>
          <input
            type="text"
            name="documento"
            inputmode="numeric"
            placeholder="000.000.000-00 ou 00.000.000/0000-00"
          />
        </label>

        <label>
          <span class="label-text">📞 Telefone:</span>
          <input type="tel" name="telefone" placeholder="(00) 00000-0000" />
        </label>

        <div class="form-section-header">🏠 Detalhes do Atendimento</div>

        <label>
          <span class="label-text">🟢 Status:</span>
          <select name="status" required>
            <option value="novo">Cliente novo</option>
            <option value="interessado">Interessado</option>
            <option value="visita">Visita agendada</option>
          </select>
        </label>

        <label>
          <span class="label-text">📅 Data do Atendimento:</span>
          <input type="date" name="data" required />
        </label>

        <label class="form-row-full">
          <span class="label-text">🏘️ Imóvel de Interesse:</span>
          <select name="imovel">
            <option value="">-- Selecione um imóvel (opcional) --</option>
          </select>
        </label>

        <label class="form-row-full">
          <span class="label-text">✏️ Descrição do Atendimento:</span>
          <textarea
            name="descricao"
            required
            placeholder="Descreva os detalhes do atendimento, interesse do cliente, observações importantes..."
          ></textarea>
        </label>

        <label class="form-row-full">
          <span class="label-text">📝 Adicionar Nota/Lembrete:</span>
          <textarea
            name="nota"
            placeholder="Ex: Cliente quer ver o imóvel no sábado às 14h, prefere contato via WhatsApp..."
            rows="2"
          ></textarea>
        </label>

        <button type="submit">➕ Cadastrar Atendimento</button>
      </form>

      <h2
        style="
          color: var(--color-white);
          margin-bottom: 16px;
          font-size: 1.3rem;
          display: flex;
          align-items: center;
          gap: 10px;
        "
      >
        📋 Atendimentos Cadastrados
      </h2>
      <ul id="lista-atendimentos"></ul>
      <footer class="footer-dev">
        Desenvolvido por
        <a
          href="https://www.instagram.com/abr3u.dev/"
          target="_blank"
          style="
            color: #c9a961;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
          "
          onmouseover="this.style.color = '#fff'"
          onmouseout="this.style.color = '#c9a961'"
          >Ruan Abreu</a
        >
      </footer>
    </div>
    <script src="/tela-cadastro-atendimento/script.js"></script>
  </body>
</html>
