<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Área administrativa - Gabrielly Silva Corretora"
    />
    <meta name="robots" content="noindex, nofollow" />
    <title>Login - Gabrielly Silva Corretora</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style-padrao.css" />
    <link rel="stylesheet" href="style-login.css" />
    <link rel="stylesheet" href="style-login-pro.css" />
    <script src="script-login.js" defer></script>
  </head>
  <body>
    <div class="login-container">
      <div class="logo-container">
        <div class="logo-icon"></div>
      </div>
      <h1>Gabrielly Silva</h1>
      <h2>Corretora de Imóveis - CRECI 26.012</h2>

      <form
        class="login-form"
        action="#"
        method="post"
        novalidate
        aria-describedby="error-message"
      >
        <h3>Acesso Administrativo</h3>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            name="email"
            type="email"
            id="email"
            placeholder="Digite seu e-mail"
            required
            autocomplete="off"
            aria-required="true"
          />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div class="password-wrapper">
            <input
              name="password"
              type="password"
              id="password"
              placeholder="Digite sua senha"
              required
              autocomplete="off"
              aria-required="true"
            />
            <button
              type="button"
              class="toggle-password"
              aria-label="Mostrar senha"
              title="Mostrar senha"
            >
              Mostrar
            </button>
          </div>
        </div>

        <p
          id="error-message"
          class="error-message"
          role="alert"
          aria-live="assertive"
        ></p>

        <div class="form-footer">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" />
            <span>Lembrar-me</span>
          </label>
          <a href="#" class="forgot">Esqueceu a senha?</a>
        </div>

        <button type="submit">
          <span>Entrar</span>
          <span class="button-icon">→</span>
        </button>
      </form>

      <div class="login-footer">
        <p class="security-info">Conexão segura e criptografada</p>
      </div>

      <footer
        style="
          background: transparent;
          color: rgba(255, 255, 255, 0.6);
          text-align: center;
          padding: 1.5rem 1rem;
          margin-top: auto;
          border-top: 1px solid rgba(255, 255, 255, 0.15);
        "
      >
        <p style="margin-bottom: 0.5rem; font-size: 0.9rem">
          &copy; 2026 Gabrielly Silva - Corretora de Imóveis
        </p>
        <p style="font-size: 0.8rem; opacity: 0.6">
          Desenvolvido por
          <a
            href="https://www.instagram.com/abr3u.dev/"
            target="_blank"
            style="
              color: #c9a961;
              text-decoration: none;
              font-weight: 700;
              transition: all 0.3s ease;
            "
            onmouseover="this.style.color = '#fff'"
            onmouseout="this.style.color = '#c9a961'"
            >Ruan Abreu</a
          >
        </p>
      </footer>
    </div>
  </body>
</html>
