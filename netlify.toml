# ================================================
# CONFIGURAÇÃO NETLIFY - GABRIELLY CORRETORA
# ================================================

# Build Settings
[build]
  command = "node build-config.js"
  publish = "."
  
# Ignorar arquivos sensíveis no deploy
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF . backend/"

# ================================================
# REDIRECIONAMENTOS
# ================================================

# SPA - Redirecionar todas as rotas para index.html
[[redirects]]
  from = "/painel"
  to = "/tela-de-login/painel.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/tela-de-login/login.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ================================================
# SECURITY HEADERS (OWASP Recomendados)
# ================================================

[[headers]]
  for = "/*"
  [headers.values]
    # Prevenir clickjacking
    X-Frame-Options = "DENY"
    
    # Prevenir MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # XSS Protection (navegadores legados)
    X-XSS-Protection = "1; mode=block"
    
    # Política de referenciamento
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Forçar HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Permissions Policy (Feature Policy)
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    
    # Content Security Policy
    Content-Security-Policy = """
      default-src 'self'; \
      script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; \
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; \
      font-src 'self' https://fonts.gstatic.com; \
      img-src 'self' data: https: blob:; \
      connect-src 'self' https://*.supabase.co; \
      frame-ancestors 'none'; \
      base-uri 'self'; \
      form-action 'self'; \
      upgrade-insecure-requests
    """

# ================================================
# CACHE CONTROL
# ================================================

# Cache agressivo para assets estáticos
[[headers]]
  for = "/ativos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/tela-inicial/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache moderado para JavaScript
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/javascript; charset=utf-8"

# Cache moderado para CSS
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/css; charset=utf-8"

# Sem cache para HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ================================================
# VARIÁVEIS DE AMBIENTE
# ================================================
# Configure no Netlify Dashboard:
# Site Settings → Environment Variables
#
# Variáveis necessárias:
#   - SUPABASE_URL (obrigatório)
#   - SUPABASE_ANON_KEY (obrigatório)
#
